<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Enchanté - Dijital Menü</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111111; /* Menülerin siyah ağırlığına tam uyum */
            font-family: 'Arial', sans-serif;
            color: #ffffff;
        }
        header {
            text-align: center;
            padding: 20px 10px;
            background-color: #000000;
            border-bottom: 2px solid #b3893e; /* Ma Enchanté Gold Çizgisi */
        }
        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #b3893e;
        }
        header p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            color: #aaaaaa;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }
        .menu-resim {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }
        .bolum-baslik {
            font-size: 1.2rem;
            color: #b3893e;
            margin: 20px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid #b3893e;
            padding-left: 10px;
        }
        footer {
            text-align: center;
            padding: 30px 10px;
            background-color: #000000;
            color: #666666;
            font-size: 0.85rem;
            margin-top: 40px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <h1>MA ENCHANTÉ</h1>
        <p>Cafe & Bistro • İstanbul</p>
    </header>

    <div class="container">
        
        <!-- 1. RESİM: ANA MENÜ -->
        <div class="bolum-baslik">Yemekler & Tatlılar</div>
        <img src="ana-menu.jpg" alt="Ma Enchanté Ana Menü" class="menu-resim">

        <!-- 2. RESİM: SOĞUK İÇECEKLER -->
        <div class="bolum-baslik">Soğuk İçecekler</div>
        <img src="soguk-icecekler.jpg" alt="Soğuk İçecekler" class="menu-resim">

        <!-- 3. RESİM: ÇİKOLATALAR -->
        <div class="bolum-baslik">Sıcak & Soğuk Çikolatalar</div>
        <img src="cikolatalar.jpg" alt="Sıcak ve Soğuk Çikolatalar" class="menu-resim">

        <!-- 4. RESİM: HİKAYEMİZ (İstediğin gibi tam buraya, yani 4. sıraya koyduk) -->
        <div class="bolum-baslik">Hikayemiz</div>
        <img src="hikaye.png" alt="Ma Enchanté Hikayemiz" class="menu-resim">

        <!-- 5. RESİM: ÇAY VE KAHVE -->
        <div class="bolum-baslik">Çay & Kahve</div>
        <img src="cay-kahve.jpg" alt="Çay ve Kahve Menüsü" class="menu-resim">

    </div>

    <footer>
        <p>© 2026 Ma Enchanté. Tüm Hakları Saklıdır.</p>
    </footer>

</body>
</html>
